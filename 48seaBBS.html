<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お知らせ BBS</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: #f4f4f4; color: #1c1c1c; font-size: 14px; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

.toolbar { background: #1c1c1c; color: white; padding: 10px 14px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.toolbar-title { flex: 1; font-size: 0.85rem; font-weight: 700; }
.btn-new { background: #3a6ea8; border: none; color: white; font-size: 0.78rem; font-weight: 700; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-family: inherit; }
.btn-new:active { background: #2a5a8a; }

.thread-list { flex: 1; overflow-y: auto; padding: 10px 12px 20px; }
.empty-msg { text-align: center; padding: 40px 0; color: #888; font-size: 0.85rem; line-height: 1.8; }

.thread-item { background: white; border-radius: 10px; margin-bottom: 8px; border: 1px solid #ddd; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
.thread-header { display: flex; align-items: flex-start; gap: 10px; padding: 11px 13px; cursor: pointer; user-select: none; -webkit-user-select: none; }
.thread-unread-dot { width: 8px; height: 8px; border-radius: 50%; background: #3a6ea8; flex-shrink: 0; margin-top: 5px; }
.thread-unread-dot.read { background: transparent; }
.thread-meta { flex: 1; min-width: 0; }
.thread-title { font-size: 0.88rem; font-weight: 700; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.thread-info  { font-size: 0.68rem; color: #888; display: flex; gap: 8px; flex-wrap: wrap; }
.thread-author-lbl { font-weight: 600; color: #555; }
.thread-reply-badge { background: #e8f0fa; border: 1px solid #c0d0ea; border-radius: 10px; padding: 1px 7px; font-size: 0.65rem; font-weight: 700; color: #3a6ea8; flex-shrink: 0; align-self: center; }
.thread-arrow { font-size: 0.6rem; color: #aaa; transition: transform 0.2s; flex-shrink: 0; margin-top: 4px; }
.thread-item.open .thread-arrow { transform: rotate(90deg); }
.thread-body { display: none; border-top: 1px solid #eee; }
.thread-item.open .thread-body { display: block; }

.thread-post { padding: 10px 13px; border-bottom: 1px solid #f0f0f0; }
.thread-post:last-child { border-bottom: none; }
.post-header { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }
.post-author { font-size: 0.75rem; font-weight: 700; color: #3a6ea8; }
.post-op-badge { font-size: 0.6rem; background: #3a6ea8; color: white; border-radius: 3px; padding: 1px 5px; font-weight: 700; }
.post-date   { font-size: 0.65rem; color: #aaa; flex: 1; }
.post-del-btn { font-size: 0.65rem; background: none; border: 1px solid #e0b0b0; color: #c05050; border-radius: 4px; padding: 2px 7px; cursor: pointer; font-family: inherit; flex-shrink: 0; }
.post-content { font-size: 0.82rem; line-height: 1.65; color: #222; white-space: pre-wrap; word-break: break-word; }
.reply-indent { background: #fafafa; padding-left: 18px; border-left: 3px solid #e0e8f0; }

.reply-form { padding: 10px 13px 12px; background: #f4f8fe; border-top: 1px solid #dde8f4; }
.reply-form input, .reply-form textarea {
  font-family: 'Noto Sans JP', sans-serif; font-size: 0.82rem;
  border: 1px solid #c8d8e8; border-radius: 7px; padding: 7px 10px;
  width: 100%; background: white; color: #1c1c1c; outline: none; margin-bottom: 6px; display: block;
}
.reply-form textarea { resize: vertical; min-height: 56px; }
.reply-form input:focus, .reply-form textarea:focus { border-color: #3a6ea8; }
.reply-btns { display: flex; gap: 6px; justify-content: flex-end; }
.btn-reply  { background: #2e7d5a; border: none; color: white; font-size: 0.78rem; font-weight: 700; padding: 7px 18px; border-radius: 7px; cursor: pointer; font-family: inherit; }
.btn-close  { background: none; border: 1px solid #ccc; color: #666; font-size: 0.78rem; padding: 7px 14px; border-radius: 7px; cursor: pointer; font-family: inherit; }

/* オーバーレイ共通 */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.popup { background: #f4f4f4; width: 100%; border-radius: 18px 18px 0 0; padding: 18px 16px 32px; animation: slideUp 0.22s ease; max-height: 92dvh; overflow-y: auto; }
@keyframes slideUp { from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1} }
.handle { width: 38px; height: 4px; background: #ccc; border-radius: 2px; margin: 0 auto 14px; }
.popup-title { font-size: 1rem; font-weight: 700; margin-bottom: 14px; }
.form-label { font-size: 0.72rem; font-weight: 700; color: #666; margin-bottom: 4px; }
.popup input, .popup textarea {
  font-family: 'Noto Sans JP', sans-serif; font-size: 0.85rem;
  border: 1px solid #ccc; border-radius: 8px; padding: 9px 12px;
  width: 100%; background: white; color: #1c1c1c; outline: none; margin-bottom: 10px; display: block;
}
.popup textarea { resize: vertical; min-height: 90px; }
.popup input:focus, .popup textarea:focus { border-color: #3a6ea8; }
.submit-row { display: flex; gap: 8px; margin-top: 4px; }
.submit-row button { flex: 1; padding: 10px; font-size: 0.85rem; border-radius: 9px; cursor: pointer; font-family: inherit; font-weight: 700; border: none; }
.btn-submit { background: #3a6ea8; color: white; }
.btn-cancel-form { background: #eee; color: #555; }

/* 確認モーダル（中央） */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal-box { background: white; border-radius: 14px; padding: 22px 18px 18px; max-width: 320px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.3); animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)} }
.modal-icon  { font-size: 1.8rem; text-align: center; margin-bottom: 8px; }
.modal-title { font-size: 0.95rem; font-weight: 700; text-align: center; margin-bottom: 6px; }
.modal-sub   { font-size: 0.78rem; color: #888; text-align: center; margin-bottom: 14px; line-height: 1.6; }
.modal-err   { font-size: 0.75rem; color: #c05050; font-weight: 700; text-align: center; margin-bottom: 8px; display: none; }
.modal-box input { font-family: 'Noto Sans JP', sans-serif; font-size: 1rem; border: 2px solid #ddd; border-radius: 8px; padding: 9px 12px; width: 100%; text-align: center; letter-spacing: 0.2em; outline: none; margin-bottom: 12px; }
.modal-box input:focus { border-color: #3a6ea8; }
.modal-btns { display: flex; gap: 8px; }
.modal-btns button { flex: 1; padding: 9px; font-size: 0.85rem; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: 600; border: none; }
.btn-danger { background: #c05050; color: white; }
.btn-neutral { background: #f0f0f0; color: #555; }

.toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%) translateY(8px); background: rgba(28,28,28,0.92); color: #f5f5f5; padding: 8px 18px; border-radius: 24px; font-size: 0.78rem; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.25s, transform 0.25s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.loading { text-align: center; padding: 32px 0; color: #888; font-size: 0.82rem; }
.spin { display: inline-block; width: 18px; height: 18px; border: 2px solid #ddd; border-top-color: #3a6ea8; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<div class="toolbar">
  <span class="toolbar-title">📢 お知らせ掲示板</span>
  <button class="btn-new" onclick="showNew()">＋ 新規投稿</button>
</div>
<div class="thread-list" id="thread-list">
  <div class="loading"><span class="spin"></span>読み込み中…</div>
</div>

<!-- 新規スレッドオーバーレイ -->
<div id="ov-new" class="overlay" onclick="if(event.target===this)hideNew()">
  <div class="popup">
    <div class="handle"></div>
    <div class="popup-title">📝 新規投稿</div>
    <div class="form-label">投稿者名 *</div>
    <input id="n-author"  type="text"  placeholder="名前" maxlength="30"/>
    <div class="form-label">タイトル *</div>
    <input id="n-subject" type="text"  placeholder="タイトル" maxlength="60"/>
    <div class="form-label">本文 *</div>
    <textarea id="n-body" placeholder="本文を入力"></textarea>
    <div class="submit-row">
      <button class="btn-cancel-form" onclick="hideNew()">キャンセル</button>
      <button class="btn-submit"      onclick="submitNew()">投稿する</button>
    </div>
  </div>
</div>

<!-- 削除確認モーダル -->
<div id="ov-del" class="modal-overlay" onclick="if(event.target===this)closeDel()">
  <div class="modal-box">
    <div class="modal-icon">🗑️</div>
    <div class="modal-title" id="del-title">削除しますか？</div>
    <div class="modal-sub"  id="del-sub">削除すると元に戻せません。</div>
    <div id="del-pw-wrap" style="display:none">
      <div style="font-size:0.72rem;font-weight:700;color:#666;margin-bottom:5px;text-align:center">管理パスワードを入力</div>
      <input type="password" id="del-pw" placeholder="••••" maxlength="10" onkeydown="if(event.key==='Enter')confirmDel()"/>
      <div class="modal-err" id="del-err">パスワードが違います</div>
    </div>
    <div class="modal-btns">
      <button class="btn-neutral" onclick="closeDel()">キャンセル</button>
      <button class="btn-danger"  onclick="confirmDel()">削除する</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ══════════════════════════════════════════════════════
// 定数・設定
// ══════════════════════════════════════════════════════
const ADMIN_PASS   = '48';
const AUTHOR_KEY   = 'bbs_my_author';   // 投稿者名記憶
const SEEN_KEY     = 'bbs_seen';        // 既読IDセット
const MY_POSTS_KEY = 'bbs_myposts';     // 自分の投稿IDセット

// ══════════════════════════════════════════════════════
// ユーティリティ
// ══════════════════════════════════════════════════════
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDt(ts){
  const d=new Date(Number(ts));
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function uid(){ return 'b'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
let _tt;
function toast(msg,ms=2800){
  const e=document.getElementById('toast');
  e.textContent=msg; e.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>e.classList.remove('show'),ms);
}
function lsGet(k,def=null){ try{const v=localStorage.getItem(k);return v===null?def:JSON.parse(v);}catch{return def;} }
function lsSet(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch{} }

// ══════════════════════════════════════════════════════
// 親ウィンドウ経由のデータアクセス
// ══════════════════════════════════════════════════════
function getThreads(){
  try{ return (window.parent.bbsGetThreads&&window.parent.bbsGetThreads()) || []; }
  catch(e){ return []; }
}
function saveThreads(threads){
  try{ window.parent.bbsSaveThreads&&window.parent.bbsSaveThreads(threads); }
  catch(e){ /* standalone使用時は無視 */ }
}

// ══════════════════════════════════════════════════════
// 既読・自分の投稿管理
// ══════════════════════════════════════════════════════
let seenIds  = new Set(lsGet(SEEN_KEY,[])||[]);
let myPosts  = new Set(lsGet(MY_POSTS_KEY,[])||[]);

function markSeen(id){ seenIds.add(id); lsSet(SEEN_KEY,[...seenIds]); }
function isMyPost(key){ return myPosts.has(key); }
function addMyPost(key){ myPosts.add(key); lsSet(MY_POSTS_KEY,[...myPosts]); }
function countUnread(threads){ return threads.filter(t=>!seenIds.has(t.id)).length; }
function reportUnread(threads){
  try{ window.parent.postMessage({type:'bbs_unread',count:countUnread(threads)},'*'); }catch{}
}

// ══════════════════════════════════════════════════════
// 親からのメッセージ受信
// ══════════════════════════════════════════════════════
window.addEventListener('message',function(e){
  if(!e.data) return;
  if(e.data.type==='refresh_threads') renderAll();
});

// ══════════════════════════════════════════════════════
// レンダリング
// ══════════════════════════════════════════════════════
function renderAll(){
  const threads = getThreads();
  const el = document.getElementById('thread-list');

  // 開いているスレッドを記憶
  const openIds = new Set([...el.querySelectorAll('.thread-item.open')].map(e=>e.dataset.tid));

  if(!threads.length){
    el.innerHTML='<div class="empty-msg">📭 まだ投稿がありません<br>右上「＋ 新規投稿」から書き込めます</div>';
    reportUnread([]); return;
  }

  el.innerHTML='';
  [...threads].sort((a,b)=>b.date-a.date).forEach(t=>{
    const unread = !seenIds.has(t.id);
    const item = document.createElement('div');
    item.className='thread-item'+(openIds.has(t.id)?' open':'');
    item.dataset.tid=t.id;
    item.innerHTML=buildThreadHTML(t, unread);
    el.appendChild(item);
  });
  reportUnread(threads);
}

function buildThreadHTML(t, unread){
  const replies = t.replies||[];
  const savedAuthor = lsGet(AUTHOR_KEY,'')||'';
  return `
    <div class="thread-header" onclick="toggleThread('${t.id}')">
      <div class="thread-unread-dot ${unread?'':'read'}"></div>
      <div class="thread-meta">
        <div class="thread-title">${esc(t.subject)}</div>
        <div class="thread-info">
          <span class="thread-author-lbl">${esc(t.author)}</span>
          <span>${fmtDt(t.date)}</span>
        </div>
      </div>
      ${replies.length?`<span class="thread-reply-badge">返信${replies.length}</span>`:''}
      <span class="thread-arrow">▶</span>
    </div>
    <div class="thread-body">
      <!-- 本文 -->
      <div class="thread-post">
        <div class="post-header">
          <span class="post-author">${esc(t.author)}</span>
          <span class="post-op-badge">OP</span>
          <span class="post-date">${fmtDt(t.date)}</span>
          <button class="post-del-btn" onclick="askDel(event,'${t.id}',null)">削除</button>
        </div>
        <div class="post-content">${esc(t.body)}</div>
      </div>
      <!-- 返信一覧 -->
      ${replies.map((r,ri)=>`
        <div class="thread-post reply-indent">
          <div class="post-header">
            <span class="post-author">${esc(r.author)}</span>
            <span class="post-date">${fmtDt(r.date)}</span>
            <button class="post-del-btn" onclick="askDel(event,'${t.id}',${ri})">削除</button>
          </div>
          <div class="post-content">${esc(r.body)}</div>
        </div>`).join('')}
      <!-- 返信フォーム -->
      <div class="reply-form" id="rf-${t.id}">
        <div class="form-label" style="margin-bottom:5px">💬 返信する</div>
        <input type="text" id="ra-${t.id}" placeholder="名前" maxlength="30" value="${esc(savedAuthor)}"/>
        <textarea id="rb-${t.id}" placeholder="返信内容" style="min-height:50px"></textarea>
        <div class="reply-btns">
          <button class="btn-close"  onclick="toggleThread('${t.id}')">閉じる</button>
          <button class="btn-reply"  onclick="submitReply('${t.id}')">返信する</button>
        </div>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════════════
// スレッド開閉
// ══════════════════════════════════════════════════════
function toggleThread(id){
  const item=document.querySelector(`.thread-item[data-tid="${id}"]`);if(!item)return;
  const opening=!item.classList.contains('open');
  document.querySelectorAll('.thread-item.open').forEach(e=>e.classList.remove('open'));
  if(opening){
    item.classList.add('open');
    markSeen(id);
    item.querySelector('.thread-unread-dot')?.classList.add('read');
    reportUnread(getThreads());
    setTimeout(()=>{ const rf=item.querySelector('.reply-form'); rf?.scrollIntoView({behavior:'smooth',block:'nearest'}); },200);
  }
}

// ══════════════════════════════════════════════════════
// 新規投稿
// ══════════════════════════════════════════════════════
function showNew(){
  document.getElementById('n-author').value  = lsGet(AUTHOR_KEY,'')||'';
  document.getElementById('n-subject').value = '';
  document.getElementById('n-body').value    = '';
  document.getElementById('ov-new').classList.add('open');
  setTimeout(()=>{
    const a=document.getElementById('n-author');
    (a.value?document.getElementById('n-subject'):a).focus();
  },200);
}
function hideNew(){ document.getElementById('ov-new').classList.remove('open'); }

function submitNew(){
  const author  = document.getElementById('n-author').value.trim();
  const subject = document.getElementById('n-subject').value.trim();
  const body    = document.getElementById('n-body').value.trim();
  if(!author)  { document.getElementById('n-author').focus();  toast('⚠️ 名前を入力してください'); return; }
  if(!subject) { document.getElementById('n-subject').focus(); toast('⚠️ タイトルを入力してください'); return; }
  if(!body)    { document.getElementById('n-body').focus();    toast('⚠️ 本文を入力してください'); return; }

  lsSet(AUTHOR_KEY, author);
  const threads = getThreads();
  const t = { id:uid(), subject, author, body, date:Date.now(), replies:[] };
  threads.unshift(t);
  addMyPost(t.id);
  markSeen(t.id);
  saveThreads(threads);
  renderAll();
  hideNew();
  toast('✅ 投稿しました！');
}

// ══════════════════════════════════════════════════════
// 返信
// ══════════════════════════════════════════════════════
function submitReply(tid){
  const author = document.getElementById('ra-'+tid)?.value.trim();
  const body   = document.getElementById('rb-'+tid)?.value.trim();
  if(!author){ toast('⚠️ 名前を入力してください'); return; }
  if(!body)  { toast('⚠️ 返信内容を入力してください'); return; }

  lsSet(AUTHOR_KEY, author);
  const threads = getThreads();
  const t = threads.find(t=>t.id===tid); if(!t) return;
  if(!t.replies) t.replies=[];
  const ri = t.replies.length;
  t.replies.push({author, body, date:Date.now()});
  addMyPost(tid+':'+ri);
  saveThreads(threads);
  renderAll();
  setTimeout(()=>{ const item=document.querySelector(`.thread-item[data-tid="${tid}"]`); if(item&&!item.classList.contains('open')) toggleThread(tid); },60);
  toast('✅ 返信しました！');
}

// ══════════════════════════════════════════════════════
// 削除
// ══════════════════════════════════════════════════════
let _delTarget=null;

function askDel(e, tid, replyIdx){
  e.stopPropagation();
  const ri = (replyIdx===null||replyIdx===undefined||replyIdx==='null') ? null : Number(replyIdx);
  _delTarget = {tid, ri};
  const postKey = ri!==null ? `${tid}:${ri}` : tid;
  const mine = isMyPost(postKey);

  document.getElementById('del-title').textContent = ri!==null ? 'この返信を削除しますか？' : 'このスレッドを削除しますか？';
  document.getElementById('del-sub').textContent   = mine ? '削除すると元に戻せません。' : '自分の投稿ではありません。\n管理パスワードを入力してください。';
  const pw = document.getElementById('del-pw-wrap');
  pw.style.display = mine?'none':'block';
  document.getElementById('del-pw').value='';
  document.getElementById('del-err').style.display='none';
  document.getElementById('ov-del').classList.add('open');
  if(!mine) setTimeout(()=>document.getElementById('del-pw').focus(),200);
}
function closeDel(){ document.getElementById('ov-del').classList.remove('open'); _delTarget=null; }

function confirmDel(){
  if(!_delTarget) return;
  const {tid, ri} = _delTarget;
  const postKey = ri!==null ? `${tid}:${ri}` : tid;
  const mine = isMyPost(postKey);

  if(!mine){
    const pw = document.getElementById('del-pw').value;
    if(pw !== ADMIN_PASS){
      document.getElementById('del-err').style.display='block';
      document.getElementById('del-pw').value='';
      document.getElementById('del-pw').focus();
      return;
    }
  }

  const threads = getThreads();
  if(ri!==null){
    const t=threads.find(t=>t.id===tid);
    if(t&&t.replies) t.replies.splice(ri,1);
  } else {
    const idx=threads.findIndex(t=>t.id===tid);
    if(idx!==-1) threads.splice(idx,1);
  }
  saveThreads(threads);
  closeDel();
  renderAll();
  toast('🗑️ 削除しました');
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
setTimeout(renderAll, 150);
</script>
</body>
</html>
